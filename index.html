<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的纪念币收藏</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        /* 使用 Inter 字体 */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* 收藏后的视觉效果：复选标记 */
        .coin-card.collected .coin-check-icon {
            opacity: 1;
        }
        .coin-card.collected img {
            filter: none; /* 图片恢复彩色 */
        }
        /* 想收藏的视觉效果：心形图标 */
        .coin-card.wishlist .coin-wish-icon {
            opacity: 1; /* 显示心形图标 */
        }
        /* 默认状态的圆形轮廓图标（未收藏且非想收藏时显示） */
        .coin-card .coin-default-icon {
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .coin-card:hover .coin-default-icon {
            opacity: 0.8;
        }
        .coin-card.collected .coin-default-icon,
        .coin-card.wishlist .coin-default-icon {
            opacity: 0;
        }        
        /* 动画效果 */
        @keyframes fade-in-out {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
        }
        #save-status {
            animation: fade-in-out 3s ease-in-out;
        }

        /* 飞机横幅动画 */
        @keyframes fly-across {
            from { transform: translateX(-120%); }
            to   { transform: translateX(calc(100vw + 20%)); }
        }
        @keyframes banner-sway {
            0%, 100% { transform: translateY(-1px); }
            50%      { transform: translateY(2px); }
        }
        .plane-banner-group {
            position: fixed;
            z-index: 10000;
            pointer-events: none;
            display: flex;
            align-items: center;
            white-space: nowrap;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.18));
        }
        .plane-banner-group.flying {
            animation: fly-across var(--fly-duration, 6s) linear forwards;
        }
        .banner-ribbon {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 9px 22px;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.3;
            position: relative;
            text-shadow: 0 1px 0 rgba(255,255,255,0.35);
            clip-path: polygon(3% 0%, 97% 0%, 100% 50%, 97% 100%, 3% 100%, 0% 50%);
            animation: banner-sway 1.8s ease-in-out infinite;
        }
        .banner-ribbon::before,
        .banner-ribbon::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 0;
            height: 0;
        }
        .banner-ribbon::before {
            left: 0;
            transform: translateY(-50%);
            border-right: 10px solid var(--banner-bg);
            border-top: 13px solid transparent;
            border-bottom: 13px solid transparent;
        }
        .banner-ribbon::after {
            right: 0;
            transform: translateY(-50%);
            border-left: 10px solid var(--banner-bg);
            border-top: 13px solid transparent;
            border-bottom: 13px solid transparent;
        }
        .tow-rope {
            width: 18px;
            height: 0;
            border-top: 2px dashed;
            opacity: 0.55;
            margin: 0 3px;
        }
        .plane-svg {
            width: 172px;
            height: 80px;
            flex-shrink: 0;
        }
        @media (max-width: 640px) {
            .banner-ribbon {
                font-size: 13px;
                padding: 7px 16px;
            }
            .plane-svg {
                width: 128px;
                height: 60px;
            }
        }

        /* 点阵模态框 */
        #matrixModal {
            display: none;
        }
        #matrixModal.active {
            display: flex;
        }
        .matrix-cell {
            width: 18px;
            height: 18px;
            border: 1px solid #e0e0e0;
        }
        .matrix-cell.filled {
            background: #000;
        }
        #matrixModal .matrix-body {
            display: grid;
            grid-template-rows: repeat(10, 18px);
            grid-auto-flow: column;
            gap: 2px;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .matrix-gap {
            width: 8px;
            grid-row: 1 / -1;
        }
        #matrixModal .mint-section {
            flex: 1;
            border-right: 2px solid #000;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #matrixModal .mint-section:last-child {
            border-right: none;
        }
        #matrixModal.analysis-active .mint-index-0 .matrix-cell.filled.matrix-diff { background: #ff4d4f; border-color: #ff4d4f; }
        #matrixModal.analysis-active .mint-index-1 .matrix-cell.filled.matrix-diff { background: #1890ff; border-color: #1890ff; }
        #matrixModal.analysis-active .mint-index-2 .matrix-cell.filled.matrix-diff { background: #52c41a; border-color: #52c41a; }
        #matrixModal.analysis-active .mint-section[data-mint="沈阳"] .matrix-cell.filled.matrix-diff { background: #ff4d4f; border-color: #ff4d4f; }
        #matrixModal.analysis-active .mint-section[data-mint="上海"] .matrix-cell.filled.matrix-diff { background: #1890ff; border-color: #1890ff; }
        #matrixModal.analysis-active .mint-section[data-mint="南京"] .matrix-cell.filled.matrix-diff { background: #52c41a; border-color: #52c41a; }

        /* ================= 点阵试验场样式 ================= */

        #matrixLabModal .lab-coin {
            width: min(800px, 90vw);
            margin: 10px auto;
            border: 2px solid #000;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
        }

        #matrixLabModal .lab-header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding: 8px 0;
        }

        #matrixLabModal .lab-header h2 {
            margin: 0;
            font-size: 16px;
        }

        #matrixLabModal .lab-header .code {
            font-size: 14px;
            margin-top: 4px;
        }

        #matrixLabModal .lab-mints {
            display: flex;
        }

        #matrixLabModal .lab-mint {
            flex: 1;
            min-width: 0;
            border-right: 2px solid #000;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #matrixLabModal .lab-mint:last-child {
            border-right: none;
        }

        #matrixLabModal .lab-mint-name {
            text-align: center;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        #matrixLabModal .lab-matrix {
            display: grid;
            grid-template-rows: repeat(10, 18px);
            grid-auto-flow: column;
            gap: 2px;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #matrixLabModal .lab-cell {
            width: 18px;
            height: 18px;
            border: 1px solid #e0e0e0;
        }

        #matrixLabModal .lab-cell.black {
            background: #000;
        }

        #matrixLabModal.analysis-active .lab-mint[data-mint="沈阳"] .lab-cell.black.lab-diff {
            background: #ff4d4f;
            border-color: #ff4d4f;
        }
        #matrixLabModal.analysis-active .lab-mint[data-mint="上海"] .lab-cell.black.lab-diff {
            background: #1890ff;
            border-color: #1890ff;
        }
        #matrixLabModal.analysis-active .lab-mint[data-mint="南京"] .lab-cell.black.lab-diff {
            background: #52c41a;
            border-color: #52c41a;
        }

        #matrixLabModal .lab-gap-column {
            width: 8px;
            grid-row: 1 / -1;
        }

        /* 试验场 wrapper：固定宽高，旋转时不改变布局 */
        #matrixLabModal .lab-matrix-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        #matrixLabModal .lab {
            width: min(800px, 90vw);
            margin: 10px auto;
            border: 2px solid #000;
            background: #fff;
            overflow: hidden;
            box-sizing: border-box;
        }

        #matrixLabModal .lab-header-form {
            text-align: center;
            border-bottom: 2px solid #000;
            padding: 8px 0;
            font-size: 20px;
            font-weight: bold;
        }

        #matrixLabModal .lab-input {
            padding: 12px;
        }

        #matrixLabModal .lab-input label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        #matrixLabModal .lab-input input,
        #matrixLabModal .lab-input textarea {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
            padding: 6px;
            font-family: monospace;
            font-size: 14px;
        }

        #matrixLabModal .lab-input textarea {
            height: 110px;
        }

        #matrixLabModal .lab-version-block {
            border: 1px dashed #aaa;
            padding: 8px;
            margin-top: 12px;
        }

        #matrixLabModal .lab-actions {
            width: min(800px, 90vw);
            margin: 10px auto;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            box-sizing: border-box;
        }

        #matrixLabModal .lab-actions button {
            padding: 6px 14px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 4px;
            background: #f5f5f5;
            color: #000;
            flex: 0 0 auto;
        }

        #matrixLabModal .lab-actions button:hover {
            background: #e0e0e0;
        }

        #matrixLabModal .lab-actions button.active-btn {
            background: #bfdbfe;
            color: #1d4ed8;
        }

        /* 骨架屏动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .skeleton {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* 收藏概览抽屉样式 */
        .collection-overview {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .collection-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            cursor: pointer;
        }
        .collection-summary {
            display: flex;
            align-items: center;
            flex: 1;
        }
        .collection-count {
            margin-right: 1rem;
            font-weight: 600;
            color: #374151;
        }
        .progress-container {
            flex: 1;
            height: 8px;
            background-color: #E5E7EB;
            border-radius: 4px;
            overflow: hidden;
            position: relative; /* 相对定位以包含绝对定位的子元素 */
        }
        .progress-bar {
            height: 100%;
            background-color:  #22C55E;
            border-radius: 4px;
            transition: width 0.3s ease;
            position: absolute; 
            top: 0;
            left: 0;
        }
        .progress-bar.collected {
            background-color: #22C55E; /* 绿色，代表已收藏 */
            z-index: 2; /* 确保它在想收藏之上 */
        }

        .progress-bar.wishlist {
            background-color: #FBBF24; /* 琥珀色，代表想收藏 */
            z-index: 1; /* 确保它在已收藏之下 */
        }
        .collection-details {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        .collection-overview.expanded .collection-details {
            padding: 0 1rem 1rem;
            max-height: 70vh;
            overflow-y: auto;
        }
        .overview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }
        .overview-column h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .stat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .stat-label {
            font-size: 0.875rem;
            color: #4B5563;
        }
        .stat-value {
            font-size: 0.875rem;
            font-weight: 500;
            color: #1F2937;
        }
        /* 设置主题下拉框的固定宽度 */
        #themeFilter {
            width: 95px;
        }
        #denominationFilter {
            width: 95px;
        }
        #sizeFilter {
            width: 95px;
        }
        #metalFilter {
            width: 95px;
        }
        #yearFilter {
            width: 95px;
        }
        #statusFilter {
            width: 95px;
        }
        /* 图片放大弹窗 */
        #zoomModal {
            display: none;
        }
        #zoomModal.active {
            display: flex;
        }
        .zoom-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90vw;
            max-height: 95vh;
            overflow-y: auto;
        }
        .zoom-top-fixed {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        .zoom-bottom-flex {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        .zoom-name {
            margin-bottom: 0.75rem;
            padding: 0.3rem 1.2rem;
            max-width: 90vw;
            text-align: center;
            color: #fff;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            line-height: 1.6;
            background: rgba(255,255,255,0.08);
            border-radius: 0.4rem;
        }
        .zoom-image-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
        }
        .zoom-image {
            max-width: 90vw;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 0.5rem;
            cursor: crosshair;
        }
        .zoom-lens {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.15) inset;
            background-repeat: no-repeat;
            pointer-events: none;
            display: none;
            z-index: 20;
        }
        .zoom-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: zoomSpin 0.8s linear infinite;
            pointer-events: none;
        }
        @keyframes zoomSpin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .zoom-desc {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            max-width: 90vw;
            text-align: center;
            color: #e0e0e0;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 0.03em;
            background: rgba(255,255,255,0.06);
            border-radius: 0.5rem;
            min-height: 2.5rem;
        }
        .zoom-face-label {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            color: #888;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            letter-spacing: 0.05em;
        }
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.3rem 0.6rem;
            background: rgba(255,255,255,0.06);
            border-radius: 0.4rem;
        }
        .zoom-ctrl-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: #ccc;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            outline: none;
            font-family: inherit;
        }
        .zoom-ctrl-btn:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }
        .zoom-ratio {
            color: #ccc;
            font-size: 0.85rem;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            min-width: 2.5rem;
            text-align: center;
            letter-spacing: 0.03em;
        }
        .zoom-hint {
            color: #666;
            font-size: 0.75rem;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            margin-left: 0.5rem;
            letter-spacing: 0.03em;
        }
        .zoom-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            outline: none;
        }
        .zoom-arrow:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }
        .zoom-arrow:active {
            background: rgba(255,255,255,0.35);
        }
        /* 触屏设备：禁用放大镜功能 */
        @media (hover: none) and (pointer: coarse) {
            .zoom-controls {
                display: none;
            }
            .zoom-image {
                cursor: default;
            }
        }
        /* 响应式：小屏幕下调整 */
        @media (max-width: 640px) {
            .zoom-desc {
                font-size: 0.875rem;
                padding: 0.5rem 1rem;
                line-height: 1.6;
            }
            .zoom-image {
                max-height: 55vh;
            }
            .zoom-arrow {
                width: 2.5rem;
                height: 2.5rem;
            }
        }

        /* 顶部滚动提示条 */
        #scrollHint {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 90;
            transform: translateY(-100%);
            transition: transform 0.3s ease-in-out;
            background: linear-gradient(to right, rgba(30, 64, 175, 0.8), rgba(37, 99, 235, 0.8));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            text-align: center;
            padding: 8px 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        #scrollHint.visible {
            transform: translateY(0);
        }
        .hint-badge {
            display: inline-block;
            min-width: 18px;
            padding: 0 5px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            line-height: 18px;
            text-align: center;
            vertical-align: middle;
            transition: transform 0.15s ease;
        }
        .hint-badge.collected {
            background: rgba(34, 197, 94, 0.25);
            color: #4ade80;
        }
        .hint-badge.wishlist {
            background: rgba(251, 191, 36, 0.25);
            color: #fbbf24;
        }

        /* 底部 footer 提示条 */
        #footerHint {
            transform: translateY(100%);
        }
        #footerHint.visible {
            transform: translateY(0);
        }

        /* 统计概览弹窗 */
        #statsModal {
            display: none;
        }
        #statsModal.active {
            display: flex;
        }
        .stats-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            min-width: 100px;
        }
        .stats-card .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e40af;
        }
        .stats-card .stat-label-text {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 2px;
        }
        .stats-chart-section {
            padding: 16px;
        }
        .stats-chart-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            text-align: center;
        }
        .stats-sub-label {
            font-size: 0.75rem;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 8px;
        }
        /* ===== 每日一题弹窗 ===== */
        @keyframes quizSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes quizShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        @keyframes quizPulse {
            0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
            70% { box-shadow: 0 0 0 16px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }
        @keyframes quizConfettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        @keyframes quizFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #quizModal { display: none; }
        #quizModal.active { display: flex; }
        #quizModal .quiz-card {
            animation: quizSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        #quizModal .quiz-card.shake {
            animation: quizShake 0.5s ease;

                return '<path d="m30 12a9 9 0 0 1 9 9v4h-18v-4a9 9 0 0 1 9-9z" fill="#6ddbdd"/>' +
                    '<path d="m21 23h18a2 2 0 0 1 2 2v3h-22v-3a2 2 0 0 1 2-2z" fill="currentColor"/>' +
                    '<path d="m3 42s2 6 27 6 27-6 27-6v-5a17.226 17.226 0 0 0 -16-10h-22a17.226 17.226 0 0 0 -16 10z" fill="currentColor" opacity=".75"/>' +

        function showFlyBanner(coinName, options = {}) {
            const { type = 'fighter', mode = 'collect' } = options;

            if (activePlanes >= MAX_CONCURRENT_PLANES) {
                const oldest = document.querySelector('.plane-banner-group');
                if (oldest) { oldest.remove(); activePlanes--; }
            }

            const theme = PLANE_THEMES[themeIndex % PLANE_THEMES.length];
            themeIndex++;

            const lane = activePlanes % 3;
            const topPct = 10 + lane * 10;

            const dur = type === 'ufo' ? '12s' : (type === 'helicopter' || type === 'airliner') ? '9s' : '6s';

            const group = document.createElement('div');
            group.className = 'plane-banner-group flying';
            group.style.top = topPct + '%';
            group.style.setProperty('--banner-bg', theme.banner);
            group.style.setProperty('--fly-duration', dur);

            const banner = document.createElement('div');
            banner.className = 'banner-ribbon';
            banner.style.background = theme.banner;
            banner.style.color = theme.text;

            const hl = '<span style="font-weight:900;color:' + theme.plane + '">';
            if (mode === 'collect') {
                banner.innerHTML = '🎉 收藏「' + hl + escapeHtml(coinName) + '</span>」成功！🎉';
            } else if (mode === 'year') {
                banner.innerHTML = '🏆「' + hl + escapeHtml(coinName) + '年</span>」全部集齐！🏆';
            } else if (mode === 'theme') {
                banner.innerHTML = '🏆「' + hl + escapeHtml(coinName) + '</span>」主题全部集齐！🏆';
            } else if (mode === 'fullset') {
                banner.innerHTML = '🚀 大全套「' + hl + escapeHtml(coinName) + '枚</span>」全部集齐！🚀';
            }

            const rope = document.createElement('div');
            rope.className = 'tow-rope';
            rope.style.borderColor = theme.plane;

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'plane-svg');
            svg.setAttribute('viewBox', '0 0 60 60');
            svg.style.color = theme.plane;
            svg.innerHTML = getAircraftSVG(type);

            group.appendChild(banner);
            group.appendChild(rope);
            group.appendChild(svg);
            document.body.appendChild(group);
            activePlanes++;

            group.addEventListener('animationend', () => {
                group.remove();
                activePlanes--;
            });
        }

        function checkCollectionComplete(coin) {
            if (coin.theme) {
                const themeCoins = allCoinsData.filter(c => c.theme === coin.theme);
                if (themeCoins.every(c => myCollection.includes(c.id))) {
                    setTimeout(() => showFlyBanner(coin.theme, { type: 'helicopter', mode: 'theme' }), 800);
                }
            }
            if (coin.year && coin.year !== '无') {
                const yearCoins = allCoinsData.filter(c => c.year === coin.year);
                if (yearCoins.every(c => myCollection.includes(c.id))) {
                    setTimeout(() => showFlyBanner(coin.year, { type: 'airliner', mode: 'year' }), 1200);
                }
            }
            if (allCoinsData.every(c => myCollection.includes(c.id))) {
                setTimeout(() => showFlyBanner(String(allCoinsData.length), { type: 'ufo', mode: 'fullset' }), 1800);
            }
        }

        document.getElementById('current-year').textContent = new Date().getFullYear();

        /// 隐藏菜单的函数
        function hideMenu() {
            fabMenu.classList.add('hidden');
            // 获取图标元素并改变其路径为“加号”
            const fabIconPath = document.getElementById('fab-icon-path');
            if (fabIconPath) {
                fabIconPath.setAttribute('d', 'M12 4v16m8-8H4');
            }
        }

        // 显示菜单的函数
        function showMenu() {
            fabMenu.classList.remove('hidden');
            // 获取图标元素并改变其路径为“减号”
            const fabIconPath = document.getElementById('fab-icon-path');
            if (fabIconPath) {
                fabIconPath.setAttribute('d', 'M4 12h16');
            }
        }

        // 切换菜单显示/隐藏状态
        fabButton.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止点击事件冒泡
        if (fabMenu.classList.contains('hidden')) {
            showMenu();
        } else {
            hideMenu();
        }
        });

        // 点击菜单内的任何元素时，阻止事件冒泡到 document
        fabMenu.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止点击事件冒泡，这样就不会触发 document 上的隐藏逻辑
        });

        // 当点击 fabContainer 以外的任何地方时，隐藏菜单
        function handleDocumentClick(e) {
            if (!fabContainer.contains(e.target)) {
                hideMenu();
            }
        }
        document.addEventListener('click', handleDocumentClick);

        // 1. 加载本地收藏数据
        function loadCollection() {
            try {
                const savedCollection = localStorage.getItem(storageKey);
                const savedWishlist = localStorage.getItem(wishlistStorageKey);
                if (savedCollection) {
                    myCollection = JSON.parse(savedCollection);
                } else {
                    myCollection = [];
                }
                if (savedWishlist) {
                    myWishlist = JSON.parse(savedWishlist);
                } else {
                    myWishlist = [];
                }
            } catch (e) {
                console.error("加载本地收藏数据失败:", e);
                myCollection = [];
                myWishlist = [];
            }
        }

        // 2. 保存收藏数据到本地
        function saveCollection() {
            try {
                localStorage.setItem(storageKey, JSON.stringify(myCollection));
                localStorage.setItem(wishlistStorageKey, JSON.stringify(myWishlist));
                saveStatus.style.opacity = '1';
                setTimeout(() => {
                    saveStatus.style.opacity = '0';
                }, 2000);
            } catch (e) {
                console.error("保存本地收藏数据失败:", e);
            }
        }
        
        // 3. 导出/导入数据
        document.getElementById('exportBtn').addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止事件冒泡

            // 临时移除全局点击监听器，防止下载时菜单意外关闭
            document.removeEventListener('click', handleDocumentClick);

            const data = {
                collected: myCollection,
                wishlist: myWishlist
            };
            const dataStr = JSON.stringify(data);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `coin_collection_backup_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            // 在一个极小的延迟后，重新添加全局点击监听器
            // 50ms 延迟足以跳过下载触发的事件，同时保证用户体验
            setTimeout(() => {
                document.addEventListener('click', handleDocumentClick);
            }, 50);
        });

        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (importedData.collected && importedData.wishlist) {
                        myCollection = importedData.collected;
                        myWishlist = importedData.wishlist;
                        saveCollection(); 
                        renderUI(); 
                        updateCollectionOverview(); 
                        alert('数据导入成功！');
                    } else {
                        throw new Error('导入的文件格式不正确');
                    }
                } catch (error) {
                    console.error('导入失败:', error);
                    alert('导入失败，请确保文件是有效的JSON格式。');
                }
            };
            reader.readAsText(file);
        });

        function openCoinZoom(coin, viewMode) {

            // viewMode 'front' = .front-image visible → imageUrl (反面)

            // 预加载另一面图片（浏览器缓存，不阻塞主流程）
            zoomPreloadImgs = [];
            var preloadSrc = zoomState.face === 'front' ? coin.imageUrl2 : coin.imageUrl;
            if (preloadSrc) {

        function renderZoomView() {
            const coin = zoomState.coin;
            if (!coin) return;
            const zoomModalName = document.getElementById('zoomModalName');
            const zoomModalImg = document.getElementById('zoomModalImg');
            const zoomModalDesc = document.getElementById('zoomModalDesc');
            const zoomModalFace = document.getElementById('zoomModalFace');
            const zoomLoading = document.getElementById('zoomLoading');
            const isFront = zoomState.face === 'front';
            const src = isFront ? coin.imageUrl2 : coin.imageUrl;

            zoomModalName.textContent = coin.name;
            zoomModalImg.alt = coin.name + (isFront ? ' 正面' : ' 反面');
            zoomModalDesc.textContent = (isFront ? coin.description2 : coin.description) || '暂无描述';
            zoomModalFace.textContent = isFront ? '【正面】' : '【反面】';

            // 先检查目标图片是否在缓存中
            var cacheImg = new Image();
            cacheImg.src = src;

            if (cacheImg.complete) {
                // 缓存命中：直接显示，不闪 loading
                zoomLoading.style.display = 'none';
                zoomModalImg.style.opacity = '1';
                zoomModalImg.src = src;
                initZoomLens();
            } else {
                // 缓存未命中：立即隐藏旧图，显示 loading
                zoomModalImg.style.opacity = '0';
                zoomLoading.style.display = 'block';
                zoomModalImg.onload = function() {
                    zoomLoading.style.display = 'none';
                    zoomModalImg.style.opacity = '1';
                    initZoomLens();
                };
                zoomModalImg.src = src;
            }
        }

        let lensController;
        let lensUpdateFn;

        function initZoomLens() {
            // 清理上一次的监听器
            if (lensController) lensController.abort();
            lensController = new AbortController();
            const signal = lensController.signal;

            const img = document.getElementById('zoomModalImg');
            const lens = document.getElementById('zoomLens');
            const wrapper = document.getElementById('zoomImageWrapper');

            // 保持放大镜状态不重置（切换正反面时状态保持）
            lens.style.display = zoomState.lensActive ? 'block' : 'none';
            updateZoomRatioDisplay();

            lensUpdateFn = function(e) {
                if (!zoomState.lensActive) return;
                const rect = img.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                if (x < 0 || y < 0 || x > rect.width || y > rect.height) return;
                const fracX = x / rect.width;
                const fracY = y / rect.height;
                const zf = zoomState.zoomFactor;
                const bgW = rect.width * zf;
                const bgH = rect.height * zf;
                const lensW = lens.offsetWidth;
                const lensH = lens.offsetHeight;

                lens.style.backgroundImage = `url(${img.src})`;
                lens.style.backgroundSize = `${bgW}px ${bgH}px`;
                const bgX = fracX * bgW - lensW / 2;
                const bgY = fracY * bgH - lensH / 2;
                lens.style.backgroundPosition = `-${bgX}px -${bgY}px`;

                const lensLeft = x - lensW / 2;
                const lensTop = y - lensH / 2;
                lens.style.left = `${lensLeft}px`;
                lens.style.top = `${lensTop}px`;
            };

            wrapper.addEventListener('mousemove', lensUpdateFn, { signal });
            wrapper.addEventListener('mouseleave', function() {
                lens.style.display = 'none';
            }, { signal });
            wrapper.addEventListener('mouseenter', function() {
                if (zoomState.lensActive) {
                    lens.style.display = 'block';
                }
            }, { signal });

            wrapper.addEventListener('click', function(e) {
                if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) return;
                zoomState.lensActive = !zoomState.lensActive;
                if (zoomState.lensActive) {
                    lens.style.display = 'block';
                    if (lensUpdateFn) lensUpdateFn(e);
                } else {
                    lens.style.display = 'none';
                }
                updateZoomRatioDisplay();
            }, { signal });
        }

        function updateZoomRatioDisplay() {
            const el = document.getElementById('zoomRatio');
            if (el) el.textContent = zoomState.zoomFactor.toFixed(1) + '×';
        }

        function changeZoomFactor(delta) {
            zoomState.zoomFactor = Math.max(1.5, Math.min(3, +(zoomState.zoomFactor + delta).toFixed(1)));

        function renderMatrixContent(matrixData) {
            const content = document.getElementById('matrixModalContent');
            content.innerHTML = '';

            const mints = matrixData.mints;
            const ROWS = 10, CELL = 18, GAP = 2, GAPCOL = 8;
            const natH = ROWS * CELL + (ROWS - 1) * GAP; // 198

            // Build HTML first, no styles yet
            mints.forEach((m, mintIdx) => {
                const mintDiv = document.createElement('div');
                mintDiv.className = `mint-section mint-index-${mintIdx}`;
                mintDiv.dataset.mint = m.name;

                const nameDiv = document.createElement('div');
                nameDiv.className = 'font-bold text-sm mb-1';
                nameDiv.textContent = m.name;
                mintDiv.appendChild(nameDiv);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'matrix-body';

                m.data.forEach((col, colIdx) => {
                    if (col === '') {
                        const gap = document.createElement('div');
                        gap.className = 'matrix-gap';
                        gridDiv.appendChild(gap);
                        return;
                    }
                    col.split('').forEach((bit, rowIdx) => {
                        const cell = document.createElement('div');
                        cell.className = 'matrix-cell' + (bit === '1' ? ' filled' : '');
                        if (bit === '1') {
                            const isCommon = mints.every(m2 => {
                                const targetCol = m2.data[colIdx];
                                return targetCol && targetCol[rowIdx] === '1';
                            });
                            if (!isCommon) cell.classList.add('matrix-diff');
                        }
                        gridDiv.appendChild(cell);
                    });
                });

                mintDiv.appendChild(gridDiv);
                content.appendChild(mintDiv);
            });

            // Measure and apply styles after DOM is ready
            requestAnimationFrame(() => {
                const availWidth = Math.min(
                    content.clientWidth,
                    window.innerWidth * 0.85
                ) / mints.length - 20;
                const availHeight = window.innerHeight * 0.35;

                // Natural matrix dimensions from data
                const firstGrid = content.querySelector('.matrix-body');
                const totalCells = firstGrid.querySelectorAll('.matrix-cell').length;
                const totalGaps = firstGrid.querySelectorAll('.matrix-gap').length;
                const actualCols = Math.ceil(totalCells / 10);
                const natW = actualCols * (CELL + GAP) + totalGaps * GAPCOL - GAP;

                // Fixed scale based on 90° rotation (tightest width constraint)
                const scale90W = availWidth / natH;
                const scale90H = availHeight / natW;
                const fixedScale = Math.min(scale90W, scale90H, 1);
                window._modalFixedScale = fixedScale;

                // Visual sizes at 0° and 90°
                const vis0W = Math.ceil(natW * fixedScale);
                const vis0H = Math.ceil(natH * fixedScale);
                const vis90W = Math.ceil(natH * fixedScale);
                const vis90H = Math.ceil(natW * fixedScale);
                const wrapperSize = Math.max(vis0W, vis0H, vis90W, vis90H);

                // Wrap each grid in a fixed-size container
                content.querySelectorAll('.mint-section').forEach(section => {
                    const grid = section.querySelector('.matrix-body');
                    grid.style.width = natW + 'px';
                    grid.style.height = natH + 'px';
                    grid.style.transform = `rotate(${matrixDegree}deg) scale(${fixedScale.toFixed(3)})`;
                    grid.style.transformOrigin = 'center center';

                    // Create wrapper with fixed size
                    const wrapper = document.createElement('div');
                    wrapper.style.cssText = `display:flex;justify-content:center;align-items:center;width:${wrapperSize}px;height:${wrapperSize}px;flex-shrink:0;`;
                    grid.parentNode.insertBefore(wrapper, grid);
                    wrapper.appendChild(grid);
                });
            });
        }

            const title = document.querySelector('#matrixModalTitle h2')?.textContent || '点阵';

            const suffixes = [];

            const filename = title + suffixes.join('') + '.png';

            // 获取当前点阵数据

        // 用 Canvas API 直接绘制点阵图（毫秒级，跳过 html2canvas）
        function drawMatrixToCanvas(data, title, subtitle, deg, analysisActive, callback) {
            const mints = data.mints;
            const CELL = 18, GAP = 2, ROWS = 10, GAPCOL = 8;
            const ROWH = CELL + GAP;
            const nameH = 24, headerH = 48, border = 4, pad = 10;

            // 计算每个 mint 的自然宽高
            const mintDims = mints.map(m => {
                let w = 0;
                m.data.forEach(col => { w += col === '' ? GAPCOL : CELL + GAP; });
                if (w > 0) w -= GAP;
                return { w, h: ROWS * ROWH - GAP };
            });

            const mintCount = mints.length;
            const contentW = 600;
            const mintW = (contentW - border * 2) / mintCount;

            let maxGridH = 0;
            mintDims.forEach(d => { maxGridH = Math.max(maxGridH, d.h); });

            const canvasW = contentW;
            const canvasH = headerH + pad + nameH + maxGridH + pad;

            const dpr = 2;
            const canvas = document.createElement('canvas');
            canvas.width = canvasW * dpr;
            canvas.height = canvasH * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasW, canvasH);

            // 外边框
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvasW - 2, canvasH - 2);

            // 标题
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText(title, canvasW / 2, 28);
            if (subtitle) {
                ctx.font = '14px sans-serif';
                ctx.fillText(subtitle, canvasW / 2, 42);
            }

            // 分隔线
            ctx.beginPath();
            ctx.moveTo(2, headerH);
            ctx.lineTo(canvasW - 2, headerH);
            ctx.stroke();

            // 绘制每个 mint
            const gridTop = headerH + pad + nameH;
            mints.forEach((mint, mintIdx) => {
                const x0 = border + mintIdx * mintW;
                const y0 = headerH + pad;

                // 分隔线
                if (mintIdx > 0) {
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x0, headerH);
                    ctx.lineTo(x0, canvasH - 2);
                    ctx.stroke();
                }

                // mint 名称
                ctx.fillStyle = '#000';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(mint.name, x0 + mintW / 2, y0 + 14);

                // 计算缩放（以中心点为基准做旋转）
                const nd = mintDims[mintIdx];
                const isRotated = deg === 90 || deg === 270;
                const rotW = isRotated ? nd.h : nd.w;
                const availW = mintW - pad * 2;
                const scale = Math.min(availW / rotW, 0.85);

                // 目标区域的中心点
                const cx = x0 + mintW / 2;
                const cy = gridTop + maxGridH / 2;

                ctx.save();
                ctx.translate(cx, cy);
                if (deg !== 0) {
                    ctx.rotate(deg * Math.PI / 180);
                }
                ctx.scale(scale, scale);
                // 把原点移到网格中心，这样(0,0)就是网格中心，向四周延伸
                ctx.translate(-nd.w / 2, -nd.h / 2);

                // 画格子
                let colX = 0;
                mint.data.forEach((col, colIdx) => {
                    if (col === '') {
                        colX += GAPCOL;
                    } else {
                        for (let r = 0; r < ROWS; r++) {
                            const bit = col[r];
                            let color = null;
                            if (bit === '1') {
                                color = '#000000';
                                if (analysisActive) {
                                    const allSame = mints.every(m2 => {
                                        const c2 = m2.data[colIdx];
                                        return c2 && c2[r] === '1';
                                    });
                                    if (!allSame) {
                                        const diffColors = { '沈阳': '#ff4d4f', '上海': '#1890ff', '南京': '#52c41a' };
                                        color = diffColors[mint.name] || '#000000';
                                    }
                                }
                            }
                            if (color) {
                                ctx.fillStyle = color;
                            } else {
                                ctx.fillStyle = '#ffffff';
                            }
                            ctx.fillRect(colX, r * ROWH, CELL, CELL);
                            ctx.strokeStyle = '#e0e0e0';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(colX, r * ROWH, CELL, CELL);
                        }
                        colX += CELL + GAP;
                    }
                });

                ctx.restore();
            });

            canvas.toBlob(blob => callback(blob), 'image/png');
        }

        function getLabMatrixSize(data) {
            let totalCells = 0;
            let totalGaps = 0;
            data.forEach((col) => {
                if (col === '') { totalGaps++; } else { totalCells += col.length; }
            });
            const cols = Math.ceil(totalCells / 10);
            const natW = cols * 20 + totalGaps * 8;
            const natH = 10 * 18 + 9 * 2;
            return { natW, natH };
        }

        function labCreateMatrix(data, mintIndex, allMintsData) {
            const matrix = document.createElement('div');
            matrix.className = `lab-matrix lab-mint-${mintIndex}`;

            data.forEach((col, colIdx) => {
                if (col === '') {
                    const gap = document.createElement('div');
                    gap.className = 'lab-gap-column';
                    matrix.appendChild(gap);
                    return;
                }
                col.split('').forEach((bit, rowIdx) => {
                    const cell = document.createElement('div');
                    cell.className = 'lab-cell' + (bit === '1' ? ' black' : '');

                    if (bit === '1' && allMintsData) {
                        const isCommon = allMintsData.every(m => {
                            const targetCol = m.data[colIdx];
                            return targetCol && targetCol[rowIdx] === '1';
                        });
                        if (!isCommon) cell.classList.add('lab-diff');
                    }

                    matrix.appendChild(cell);
                });
            });

            return matrix;
        }

        function applyLabMatrixScale(matrix) {
            const scale = window._labFixedScale || 1;
            matrix.style.transform = `rotate(${labGlobalDegree}deg) scale(${scale.toFixed(3)})`;
            matrix.style.transformOrigin = 'center center';
        }

        function buildLabCoin(name, code, mints) {
            const coinWidth = Math.min(800, window.innerWidth * 0.9);
            const mintCount = mints.length;
            const separatorWidth = (mintCount - 1) * 2;
            const perMintInner = (coinWidth - 4 - separatorWidth) / mintCount;
            const availWidth = perMintInner - 20;
            const availHeight = window.innerHeight * 0.5;

            const { natW, natH } = getLabMatrixSize(mints[0].data);

            const fixedScale = Math.min(availWidth / natH, availHeight / natW, 1);
            window._labFixedScale = fixedScale;

            const vis0W = natW * fixedScale;
            const vis0H = natH * fixedScale;
            const vis90W = natH * fixedScale;
            const vis90H = natW * fixedScale;
            const wrapperSize = Math.ceil(Math.max(vis0W, vis0H, vis90W, vis90H));

            const coin = document.createElement('div');
            coin.className = 'lab-coin';
            coin.innerHTML = `<div class="lab-header"><h2>${name}</h2><div class="code">${code}</div></div>`;
            const mintsDiv = document.createElement('div');
            mintsDiv.className = 'lab-mints';

            mints.forEach((m, idx) => {
                const mintDiv = document.createElement('div');
                mintDiv.className = 'lab-mint';
                mintDiv.dataset.mint = m.name;
                mintDiv.innerHTML = `<div class="lab-mint-name">${m.name}</div>`;

                const wrapper = document.createElement('div');
                wrapper.className = 'lab-matrix-wrapper';
                wrapper.style.width = wrapperSize + 'px';
                wrapper.style.height = wrapperSize + 'px';

                const matrix = labCreateMatrix(m.data, idx, mints);
                matrix.style.width = natW + 'px';
                matrix.style.height = natH + 'px';
                applyLabMatrixScale(matrix);

                wrapper.appendChild(matrix);
                mintDiv.appendChild(wrapper);
                mintsDiv.appendChild(mintDiv);
            });

            coin.appendChild(mintsDiv);
            return coin;
        }

        function rotateAllLabMatrices() {
            labGlobalDegree += 90;
            document.querySelectorAll('.lab-matrix').forEach(m => {
                applyLabMatrixScale(m);
            });
        }

        function generateLab() {
            const name = document.getElementById('lab-name').value;
            const code = document.getElementById('lab-code').value;
            const mints = [];

            [1, 2, 3].forEach(i => {
                const mint = document.getElementById(`mint-${i}`).value.trim();
                const dataText = document.getElementById(`data-${i}`).value.trim();
                if (!mint || !dataText) return;
                try { mints.push({ name: mint, data: JSON.parse(dataText) }); } catch (e) {}
            });

            const old = document.getElementById('lab-generated');
            if (old) old.innerHTML = '';
            window._labFixedScale = undefined;

            const container = document.getElementById('lab-generated');
            if (container) {
                container.appendChild(buildLabCoin(name, code, mints));
            }
        }

        function exportLabPreview() {
            const name = document.getElementById('lab-name')?.value || '点阵';
            const code = document.getElementById('lab-code')?.value || '';
            const mints = [];

            [1, 2, 3].forEach(i => {
                const mintName = document.getElementById(`mint-${i}`)?.value.trim();
                const dataText = document.getElementById(`data-${i}`)?.value.trim();
                if (!mintName || !dataText) return;
                try { mints.push({ name: mintName, data: JSON.parse(dataText) }); } catch (e) {}
            });

            if (!mints.length) return alert('请先填写数据');

            const suffixes = [];
            const deg = labGlobalDegree % 360;
            if (deg !== 0) suffixes.push(`_rotate${deg}`);
            if (labAnalysisActive) suffixes.push('_showdiff');
            const filename = name + suffixes.join('') + '.png';

            drawMatrixToCanvas({ mints }, name, code, deg, labAnalysisActive, (blob) => {
                const a = document.createElement('a');
                a.download = filename;
                a.href = URL.createObjectURL(blob);
                a.click();
                URL.revokeObjectURL(a.href);
            });
        }
