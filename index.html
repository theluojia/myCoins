                            // 图片区域：单击翻面（仅当前卡片），双击放大
                            const imageContainer = coinCard.querySelector('.image-container');
                            let imgClickCount = 0;
                            let imgClickTimer = null;
                            imageContainer.addEventListener('click', (e) => {
                                e.stopPropagation();
                                imgClickCount++;
                                if (imgClickCount === 1) {
                                    imgClickTimer = setTimeout(() => {
                                        // 单击：只切换当前卡片的正反面
                                        const frontImg = imageContainer.querySelector('.front-image');
                                        const backImg = imageContainer.querySelector('.back-image');
                                        if (frontImg.classList.contains('hidden')) {
                                            frontImg.classList.remove('hidden');
                                            backImg.classList.add('hidden');
                                        } else {
                                            backImg.classList.remove('hidden');
                                            frontImg.classList.add('hidden');
                                        }
                                        imgClickCount = 0;
                                    }, 300);
                                } else if (imgClickCount === 2) {
                                    clearTimeout(imgClickTimer);
                                    // 双击：放大当前图片
                                    const frontImg = imageContainer.querySelector('.front-image');
                                    const viewMode = frontImg.classList.contains('hidden') ? 'back' : 'front';
                                    openCoinZoom(coin, viewMode);
                                    imgClickCount = 0;
                                }
                            });

                            // 移动端长按图片区域：放大
                            let imgPressTimer = null;
                            imageContainer.addEventListener('touchstart', (e) => {
                                imgPressTimer = setTimeout(() => {
                                    const frontImg = imageContainer.querySelector('.front-image');
                                    const viewMode = frontImg.classList.contains('hidden') ? 'back' : 'front';
                                    openCoinZoom(coin, viewMode);
                                    e.preventDefault();
                                }, 500);
                            }, { passive: false });
                            imageContainer.addEventListener('touchend', () => {
                                clearTimeout(imgPressTimer);
                            });
                            imageContainer.addEventListener('touchmove', () => {
                                clearTimeout(imgPressTimer);
                            });

                            // 点阵图标点击
                            const matrixIcon = coinCard.querySelector('.matrix-icon');
                            if (matrixIcon) {
                                matrixIcon.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    openMatrixModal(coin.id);
                                });
                            }
                        });
                        mainContainer.appendChild(yearSection);
                    });
                }
                
                // 3. 移除淡出效果并添加淡入效果
                mainContainer.classList.remove('fade-out');
                mainContainer.classList.add('fade-in');
                
            }, 300); // 延时时间与 CSS 过渡时间一致
        }
        
        // 6. 更新概览 - 需要同时统计已收藏和想收藏
        function updateCollectionOverview() {
            const totalCoins = allCoinsData.length;
            const collectedCoinsCount = myCollection.length;
            const wishlistCoinsCount = myWishlist.length;
            // 计算“已收藏”的百分比
            const collectedRate = totalCoins > 0 ? (collectedCoinsCount / totalCoins) * 100 : 0;
            // 计算“想收藏”的百分比 (包括已收藏)
            const totalGoalRate = totalCoins > 0 ? ((collectedCoinsCount + wishlistCoinsCount) / totalCoins) * 100 : 0;
            
            document.getElementById('overviewCount').innerHTML = `
                已收藏 <span style="color: #22C55E;">${collectedCoinsCount}</span> /
                想收藏 <span style="color: #FBBF24;">${wishlistCoinsCount}</span> /
                总数 ${totalCoins} 枚
            `;

            // 更新顶部提示条数字
            document.getElementById('hintCollectedCount').textContent = collectedCoinsCount;
            document.getElementById('hintWishlistCount').textContent = wishlistCoinsCount;

            // 更新“已收藏”进度条的宽度 (蓝色)
            document.getElementById('collectedProgressBar').style.width = `${collectedRate}%`;
            // 更新“想收藏”进度条的宽度 (琥珀色)
            document.getElementById('wishlistProgressBar').style.width = `${totalGoalRate}%`;

            const themesData = {};
            allCoinsData.forEach(coin => {
                if (!themesData[coin.theme]) {
                    themesData[coin.theme] = { total: 0, collected: 0, wishlisted: 0 };
                }
                themesData[coin.theme].total++;
                if (myCollection.includes(coin.id)) {
                    themesData[coin.theme].collected++;
                }
                if (myWishlist.includes(coin.id)) {
                    themesData[coin.theme].wishlisted++;
                }
            });
            
            const themeStatsContainer = document.getElementById('themeStats');
            themeStatsContainer.innerHTML = '';
            
            Object.entries(themesData)
                .sort((a, b) => b[1].collected / b[1].total - a[1].collected / a[1].total)
                .forEach(([theme, stats]) => {
                    const collectedRate = (stats.collected / stats.total) * 100;
                    const totalGoalRate = ((stats.collected + stats.wishlisted) / stats.total) * 100;
                    
                    const statButton = document.createElement('button');
                    statButton.className = 'w-full text-left p-0 rounded-xl hover:bg-gray-200 transition-colors duration-200';
                    statButton.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm text-gray-700 font-medium">${theme}</span>
                            <span class="text-xs font-medium text-gray-500"><span style="color: #22C55E;">${stats.collected}</span>/<span style="color: #FBBF24;">${stats.wishlisted}</span>/${stats.total} </span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar wishlist" style="width: ${totalGoalRate}%;"></div>
                            <div class="progress-bar collected" style="width: ${collectedRate}%;"></div>
                        </div>                        
                    `;

                    statButton.addEventListener('click', () => {
                        themeFilter.value = encodeURIComponent(theme);
                        renderUI();
                        toggleOverview(); 
                    });

                    const statItem = document.createElement('li');
                    statItem.appendChild(statButton);
                    themeStatsContainer.appendChild(statItem);
                });
            
            const yearsData = {};
            allCoinsData.forEach(coin => {
                if (!yearsData[coin.year]) {
                    yearsData[coin.year] = { total: 0, collected: 0, wishlisted: 0 };
                }
                yearsData[coin.year].total++;
                if (myCollection.includes(coin.id)) {
                    yearsData[coin.year].collected++;
                }
                if (myWishlist.includes(coin.id)) {
                    yearsData[coin.year].wishlisted++;
                }
            });
            
            const yearStatsContainer = document.getElementById('yearStats');
            yearStatsContainer.innerHTML = '';
            
            Object.entries(yearsData)
                .sort((a, b) => parseInt(b[0]) - parseInt(a[0]))
                .forEach(([year, stats]) => {
                    const collectedRate = (stats.collected / stats.total) * 100;
                    const totalGoalRate = ((stats.collected + stats.wishlisted) / stats.total) * 100;

                    const statButton = document.createElement('button');
                    statButton.className = 'w-full text-left p-0 rounded-xl hover:bg-gray-200 transition-colors duration-200';
                    statButton.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm text-gray-700 font-medium">${year}年</span>
                            <span class="text-xs font-medium text-gray-500"><span style="color: #22C55E;">${stats.collected}</span>/<span style="color: #FBBF24;">${stats.wishlisted}</span>/${stats.total} </span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar wishlist" style="width: ${totalGoalRate}%;"></div>
                            <div class="progress-bar collected" style="width: ${collectedRate}%;"></div>
                        </div>
                    `;

                    statButton.addEventListener('click', () => {
                        yearFilter.value = year;
                        renderUI();
                        toggleOverview(); 
                    });

                    const statItem = document.createElement('li');
                    statItem.appendChild(statButton);
                    yearStatsContainer.appendChild(statItem);
                });
        }

        function clearFilters() {
            themeFilter.value = '';
            denominationFilter.value = '';
            sizeFilter.value = '';
            metalFilter.value = '';
            yearFilter.value = '';
            searchInput.value = '';
            statusFilter.value = '';
            renderUI();
        }
        
        function toggleOverview() {
            const overviewElement = document.getElementById('collectionOverview');
            const toggleIcon = document.getElementById('toggle-icon');

            overviewElement.classList.toggle('expanded');
            
            if (overviewElement.classList.contains('expanded')) {
                toggleIcon.style.transform = 'rotate(180deg)'; 
            } else {
                toggleIcon.style.transform = 'rotate(0deg)'; 
            }
        }
        
        async function loadData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`网络请求失败，状态码: ${response.status}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('加载数据时出错:', error);
                throw error; 
            }
        }



        window.onload = () => {
            Promise.all([
                loadData('coin_data.json'),
                loadData('matrix.json').catch(() => ({ coins: [] }))
            ]).then(([coinsData, matrixData]) => {
                    allCoinsData = coinsData;
                    // 构建点阵数据映射：用 coin code 作为 key
                    matrixData.coins.forEach(entry => {
                        matrixDataMap[entry.code] = entry;
                    });
                    loadCollection();
                    populateFilters(allCoinsData);
                    renderUI();
                    updateCollectionOverview();

                    document.getElementById('overviewHeader').addEventListener('click', toggleOverview);
                    document.getElementById('toggle-icon').addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleOverview();
                    });
                    clearFiltersBtn.addEventListener('click', clearFilters);

                    // 筛选条件展开/收起
                    document.getElementById('filterToggleBtn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        const filterDropdown = document.getElementById('filterDropdown');
                        const filterToggleIcon = document.getElementById('filterToggleIcon');
                        filterDropdown.classList.toggle('hidden');
                        if (filterDropdown.classList.contains('hidden')) {
                            filterToggleIcon.style.transform = 'rotate(0deg)';
                        } else {
                            filterToggleIcon.style.transform = 'rotate(180deg)';
                        }
                    });
                })
                .catch(error => {
                    console.error('无法初始化应用，因为数据加载失败。');
                });
        };

        // 发送邮件功能
        const sendEmailBtn = document.getElementById('sendEmailBtn');
        if (sendEmailBtn) {
            sendEmailBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止冒泡防止菜单意外关闭
                const email = "theluojia@qq.com";
                const subject = encodeURIComponent("我的纪念币收藏网站-交流");
                // 使用 mailto 协议唤起系统默认邮件客户端
                window.location.href = `mailto:${email}?subject=${subject}`;
            });
        }

        // 填充筛选下拉菜单
        function populateFilters(coins) {
            const themes = [...new Set(coins.map(coin => coin.theme))].sort();
            const denominations = [...new Set(coins.map(coin => coin.denomination))].sort();
            const sizes = [...new Set(coins.map(coin => coin.size))].sort((a, b) => parseInt(a) - parseInt(b));
            const metals = [...new Set(coins.map(coin => coin.metal))].sort();
            const years = [...new Set(coins.map(coin => coin.year))].sort((a, b) => b - a);

            themeFilter.innerHTML = '<option value="">所有主题</option>' + themes.map(t => `<option value="${encodeURIComponent(t)}">${t}</option>`).join('');
            denominationFilter.innerHTML = '<option value="">所有面额</option>' + denominations.map(d => `<option value="${d}">${d}</option>`).join('');
            sizeFilter.innerHTML = '<option value="">所有大小</option>' + sizes.map(s => `<option value="${s}">${s}</option>`).join('');
            metalFilter.innerHTML = '<option value="">所有材质</option>' + metals.map(m => `<option value="${m}">${m}</option>`).join('');
            yearFilter.innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');

            themeFilter.addEventListener('change', renderUI);
            denominationFilter.addEventListener('change', renderUI);
            sizeFilter.addEventListener('change', renderUI);
            metalFilter.addEventListener('change', renderUI);
            yearFilter.addEventListener('change', renderUI);
            statusFilter.addEventListener('change', renderUI);
            
            sortOrderToggle.addEventListener('click', () => {
                currentSortOrder = currentSortOrder === 'desc' ? 'asc' : 'desc';
                sortOrderToggle.innerHTML = currentSortOrder === 'desc' ? 
                `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 15 15" fill="none">
                    <path d="M11.5 0.5H12C12 0.223858 11.7761 0 11.5 0V0.5ZM4.5 0.5L4.85355 0.146447C4.65829 -0.0488155 4.34171 -0.0488155 4.14645 0.146447L4.5 0.5ZM10 1H11.5V0H10V1ZM11 0.5V6.5H12V0.5H11ZM10 7H13V6H10V7ZM11.578 8H11V9H11.578V8ZM12.9743 11.6581L13.3665 10.4815L12.4179 10.1653L12.0257 11.3419L12.9743 11.6581ZM11 12H12.5V11H11V12ZM11.9743 14.6581L12.9743 11.6581L12.0257 11.3419L11.0257 14.3419L11.9743 14.6581ZM9 10C9 11.1046 9.89543 12 11 12V11C10.4477 11 10 10.5523 10 10H9ZM11 8C9.89543 8 9 8.89543 9 10H10C10 9.44772 10.4477 9 11 9V8ZM11.578 9C12.1823 9 12.609 9.59201 12.4179 10.1653L13.3665 10.4815C13.7735 9.26071 12.8648 8 11.578 8V9ZM4.14645 0.146447L1.14645 3.14645L1.85355 3.85355L4.85355 0.853553L4.14645 0.146447ZM4.14645 0.853553L7.14645 3.85355L7.85355 3.14645L4.85355 0.146447L4.14645 0.853553ZM4 0.5V15H5V0.5H4Z" fill="currentColor"/>
                </svg>` : 
                `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 15 15" fill="none">
                    <path d="M11.5 0.5H12C12 0.223858 11.7761 0 11.5 0V0.5ZM12.5 11.5L12.9743 11.6581L12.5 11.5ZM12.9819 10.0543L12.5076 9.89614L12.9819 10.0543ZM4.5 14.5L4.14645 14.8536C4.24021 14.9473 4.36739 15 4.5 15C4.63261 15 4.75978 14.9473 4.85355 14.8536L4.5 14.5ZM10 1H11.5V0H10V1ZM11 0.5V6.5H12V0.5H11ZM10 7H13V6H10V7ZM11.8617 8H11V9H11.8617V8ZM12.9743 11.6581L13.4563 10.2124L12.5076 9.89614L12.0257 11.3419L12.9743 11.6581ZM11 12H12.5V11H11V12ZM11.9743 14.6581L12.9743 11.6581L12.0257 11.3419L11.0257 14.3419L11.9743 14.6581ZM9 10C9 11.1046 9.89543 12 11 12V11C10.4477 11 10 10.5523 10 10H9ZM11 8C9.89543 8 9 8.89543 9 10H10C10 9.44772 10.4477 9 11 9V8ZM11.8617 9C12.3264 9 12.6545 9.45527 12.5076 9.89614L13.4563 10.2124C13.8191 9.12397 13.0089 8 11.8617 8V9ZM4.85355 14.8536L7.85355 11.8536L7.14645 11.1464L4.14645 14.1464L4.85355 14.8536ZM4.85355 14.1464L1.85355 11.1464L1.14645 11.8536L4.14645 14.8536L4.85355 14.1464ZM4 0V14.5H5V0H4Z" fill="currentColor"/>
                </svg>`;
                renderUI();
            });
            
            searchInput.addEventListener('input', debounce(renderUI));
        }

        function debounce(func, delay = 300) {
            let timeout;
            return function(...args) {
                const context = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(context, args), delay);
            };
        }

        const toggleImageView = document.getElementById('toggleImageView');

        toggleImageView.addEventListener('click', function() {
            isBackView = !isBackView; // 切换状态
            renderUI(); // 重新渲染页面
        });

        // 顶部和底部提示条联动
        const scrollHint = document.getElementById('scrollHint');
        const footerHint = document.getElementById('footerHint');
        let hintVisible = false;
        // 默认显示底部提示条
        footerHint.classList.add('visible');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            if (scrollTop > 200 && !hintVisible) {
                hintVisible = true;
                scrollHint.classList.add('visible');
                footerHint.classList.remove('visible');
            } else if (scrollTop <= 200 && hintVisible) {
                hintVisible = false;
                scrollHint.classList.remove('visible');
                footerHint.classList.add('visible');
            }
        }, { passive: true });

    </script>
    <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
    <script>
    // 3.6.9 加载后：非数字值替换为 --，>=10000 转为 K/M 格式
    (function(){
        function formatNum(n){
            var v = parseInt(n, 10);
            if(isNaN(v)) return '--';
            if(v < 10000) return String(v);
            if(v >= 1000000) return (v/1000000).toFixed(1) + 'M';
            return (v/1000).toFixed(1) + 'K';
        }
        var ids = ['busuanzi_site_pv','busuanzi_site_uv','busuanzi_today_pv','busuanzi_today_uv'];
        var timer = setInterval(function(){
            var allDone = true;
            ids.forEach(function(id){
                var el = document.getElementById(id);
                if(!el) return;
                var text = el.textContent;
                if(text === '--' || text === '加载中...') { allDone = false; return; }
                var formatted = formatNum(text);
                if(el.textContent !== formatted) el.textContent = formatted;
            });
            if(allDone) clearInterval(timer);
        }, 500);
        setTimeout(function(){ clearInterval(timer); }, 10000);
    })();
    </script>

    <!-- 每日一题题库 -->
    <script src="quiz_data.js"></script>
    <script>
    (function() {
        const STORAGE_KEY = 'quizDone_' + new Date().toISOString().slice(0, 10);
        const OPTION_LABELS = ['A', 'B', 'C', 'D'];
        let answered = false;

        // 检查今天是否已弹过
        if (localStorage.getItem(STORAGE_KEY)) return;

        // 随机抽题
        const question = QUIZ_QUESTIONS[Math.floor(Math.random() * QUIZ_QUESTIONS.length)];

        // 500ms 后弹出
        setTimeout(() => {
            const modal = document.getElementById('quizModal');
            const questionEl = document.getElementById('quizQuestion');
            const optionsEl = document.getElementById('quizOptions');
            const explanationEl = document.getElementById('quizExplanation');
            const closeBtn = document.getElementById('quizCloseBtn');

            questionEl.textContent = question.question;
            optionsEl.innerHTML = question.options.map((opt, i) =>
                `<button class="quiz-option w-full text-left px-5 py-3.5 rounded-xl border-2 border-gray-200 bg-gray-50 flex items-center gap-3" data-index="${i}">
                    <span class="quiz-opt-letter w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 bg-gray-200 text-gray-500">${OPTION_LABELS[i]}</span>
                    <span class="text-gray-700 font-medium text-[15px]">${opt}</span>
                </button>`
            ).join('');

            modal.classList.add('active');
            localStorage.setItem(STORAGE_KEY, 'done');

            // 选项点击
            optionsEl.querySelectorAll('.quiz-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (answered) return;
                    answered = true;
                    const idx = parseInt(this.dataset.index);
                    const isCorrect = idx === question.correctIndex;

                    optionsEl.querySelectorAll('.quiz-option').forEach((b, i) => {
                        b.classList.add('answered');
                        if (i === question.correctIndex) b.classList.add('correct');
                        else if (i === idx && !isCorrect) b.classList.add('wrong');
                    });

                    if (isCorrect) {
                        this.classList.add('pulse');
                        spawnConfetti();
                        explanationEl.className = 'mt-5 p-4 rounded-xl bg-green-50 border-2 border-green-200';
                        explanationEl.innerHTML = '<div class="flex items-center gap-2 mb-1"><span style="font-size:1.5rem">🎉</span><span class="font-bold text-green-700">回答正确！</span></div><p class="text-green-700 text-sm leading-relaxed">' + question.explanation + '</p>';
                    } else {
                        document.querySelector('#quizModal .quiz-card').classList.add('shake');
                        explanationEl.className = 'mt-5 p-4 rounded-xl bg-red-50 border-2 border-red-200';
                        explanationEl.innerHTML = '<div class="flex items-center gap-2 mb-1"><span style="font-size:1.5rem">😅</span><span class="font-bold text-red-700">回答错误</span></div><p class="text-red-700 text-sm leading-relaxed">' + question.explanation + '</p>';
                    }
                    explanationEl.classList.remove('hidden');
                    explanationEl.classList.add('quiz-fade-in');
                });
            });

            // 关闭
            function closeQuiz() {
                modal.classList.remove('active');
            }
            closeBtn.addEventListener('click', closeQuiz);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeQuiz();
            });
            document.addEventListener('keydown', function escClose(e) {
                if (e.key === 'Escape') { closeQuiz(); document.removeEventListener('keydown', escClose); }
            });

            // 键盘答题
            document.addEventListener('keydown', function keyAnswer(e) {
                if (answered) return;
                let idx = -1;
                if (e.key >= '1' && e.key <= '4') idx = parseInt(e.key) - 1;
                if (e.key.toLowerCase() >= 'a' && e.key.toLowerCase() <= 'd') idx = e.key.toLowerCase().charCodeAt(0) - 97;
                if (idx >= 0) {
                    e.preventDefault();
                    const btn = optionsEl.querySelector('[data-index="' + idx + '"]');
                    if (btn) btn.click();
                }
            });
        }, 500);

        // 撒花
        function spawnConfetti() {
            const colors = ['#f59e0b','#ef4444','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6','#f97316'];
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'quiz-confetti';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.width = (Math.random() * 10 + 6) + 'px';
                piece.style.height = (Math.random() * 10 + 6) + 'px';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = Math.random() * 0.8 + 's';
                document.body.appendChild(piece);
                setTimeout(function() { piece.remove(); }, 3500);
            }
        }
    })();
    </script>
