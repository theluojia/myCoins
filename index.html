    <script>
    /* ============================================================
       数据层：IndexedDB 替代 localStorage（#12）
       ============================================================ */
    const DB_NAME = 'myCoinsDB';
    const DB_VERSION = 1;
    const STORE_COLLECTED = 'collected';
    const STORE_WISHLIST = 'wishlist';

    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_COLLECTED)) {
                    db.createObjectStore(STORE_COLLECTED, { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains(STORE_WISHLIST)) {
                    db.createObjectStore(STORE_WISHLIST, { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = (e) => reject(e.target.error);
        });
    }

    async function dbGetAll(storeName) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readonly');
            const req = tx.objectStore(storeName).getAll();
            req.onsuccess = () => resolve(req.result.map(r => r.id));
            req.onerror = () => reject(req.error);
        });
    }

    async function dbSetAll(storeName, ids) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            store.clear();
            ids.forEach(id => store.put({ id }));
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    /* 迁移：首次使用 IndexedDB 时从 localStorage 迁移数据 */
    async function migrateStorage() {
        try {
            const hasRunMigration = localStorage.getItem('myCoinMigrated');
            if (hasRunMigration) return;
            const savedCollection = localStorage.getItem('myCoinCollection');
            const savedWishlist = localStorage.getItem('myCoinWishlist');
            if (savedCollection) {
                await dbSetAll(STORE_COLLECTED, JSON.parse(savedCollection));
            }
            if (savedWishlist) {
                await dbSetAll(STORE_WISHLIST, JSON.parse(savedWishlist));
            }
            localStorage.setItem('myCoinMigrated', '1');
        } catch (e) {
            console.warn('IndexedDB 迁移失败，继续使用 localStorage:', e);
        }
    }

    /* ============================================================
       全局状态
       ============================================================ */
    let allCoinsData = [];
    let myCollection = [];
    let myWishlist = [];
    let currentSortOrder = 'desc';
    let isBackView = false;
    let searchTimeout = null;
    let fuseIndex = null; // Fuse.js 索引

    const mainContainer = document.getElementById('main-container');
    const themeFilter = document.getElementById('themeFilter');
    const denominationFilter = document.getElementById('denominationFilter');
    const sizeFilter = document.getElementById('sizeFilter');
    const metalFilter = document.getElementById('metalFilter');
    const yearFilter = document.getElementById('yearFilter');
    const statusFilter = document.getElementById('statusFilter');
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    const sortOrderToggle = document.getElementById('sortOrderToggle');
    const saveStatus = document.getElementById('save-status');
    const searchInput = document.getElementById('searchInput');

    const fabButton = document.getElementById('fabButton');
    const fabMenu = document.getElementById('fabMenu');
    const fabContainer = document.getElementById('fabContainer');
    const exportBtn = document.getElementById('exportBtn');

    const mintConfig = {
        "上海": { short: "沪", color: "bg-purple-500/40", fullName: "上海造币有限公司" },

    let clickTimer = null;
    let clickCount = 0;

    function handleCoinCardClick(coinId) {
        clickCount++;
        if (clickCount === 1) {
            clickTimer = setTimeout(() => {
                const isCollected = myCollection.includes(coinId);
                const isWishlisted = myWishlist.includes(coinId);
                if (isCollected) {
                    // 已收藏时单击不改变状态
                } else if (isWishlisted) {
                    myWishlist = myWishlist.filter(id => id !== coinId);
                } else {
                    myWishlist.push(coinId);
                }
                saveCollection();
                renderUI();
                updateCollectionOverview();
                clickCount = 0;
            }, 300);
        } else if (clickCount === 2) {
            clearTimeout(clickTimer);
            const isCollected = myCollection.includes(coinId);
            const isWishlisted = myWishlist.includes(coinId);
            if (isCollected) {
                myCollection = myCollection.filter(id => id !== coinId);
            } else {
                if (isWishlisted) myWishlist = myWishlist.filter(id => id !== coinId);
                myCollection.push(coinId);
            }
            saveCollection();
            renderUI();
            updateCollectionOverview();
            clickCount = 0;
        }
    }

    function handleTouchStart(e, coinId) {
        pressTimer = setTimeout(() => {
            const isCollected = myCollection.includes(coinId);
            const isWishlisted = myWishlist.includes(coinId);
            if (isCollected) {
                myCollection = myCollection.filter(id => id !== coinId);
            } else {
                if (isWishlisted) myWishlist = myWishlist.filter(id => id !== coinId);
                myCollection.push(coinId);
            }
            saveCollection();
            renderUI();
            updateCollectionOverview();
            e.preventDefault();
        }, 500);
    }

    function matchesFilters(coin, theme, denom, size, metal, year, status, searchTerm) {
        if (theme && coin.theme !== theme) return false;
        if (denom && coin.denomination !== denom) return false;
        if (size && coin.size !== size) return false;
        if (metal && coin.metal !== metal) return false;
        if (year && coin.year.toString() !== year) return false;
        if (searchTerm && !coin.name.toLowerCase().includes(searchTerm)) return false;
        if (status === 'collected' && !myCollection.includes(coin.id)) return false;
        if (status === 'wishlist' && !myWishlist.includes(coin.id)) return false;
        if (status === 'uncollected' && (myCollection.includes(coin.id) || myWishlist.includes(coin.id))) return false;
        return true;
    }

    /* ============================================================
       收藏概览
       ============================================================ */
    function updateCollectionOverview() {
        const totalCoins = allCoinsData.length;
        const collectedCoinsCount = myCollection.length;
        const wishlistCoinsCount = myWishlist.length;
        const collectedRate = totalCoins > 0 ? (collectedCoinsCount / totalCoins) * 100 : 0;
        const totalGoalRate = totalCoins > 0 ? ((collectedCoinsCount + wishlistCoinsCount) / totalCoins) * 100 : 0;

        document.getElementById('overviewCount').innerHTML = `已收藏 <span style="color: #22C55E;">${collectedCoinsCount}</span> / 想收藏 <span style="color: #FBBF24;">${wishlistCoinsCount}</span> / 总数 ${totalCoins} 枚`;
        document.getElementById('collectedProgressBar').style.width = `${collectedRate}%`;
        document.getElementById('wishlistProgressBar').style.width = `${totalGoalRate}%`;

        // 主题统计
        const themesData = {};
        allCoinsData.forEach(coin => {
            if (!themesData[coin.theme]) themesData[coin.theme] = { total: 0, collected: 0, wishlisted: 0 };
            themesData[coin.theme].total++;
            if (myCollection.includes(coin.id)) themesData[coin.theme].collected++;
            if (myWishlist.includes(coin.id)) themesData[coin.theme].wishlisted++;
        });
        const themeStatsContainer = document.getElementById('themeStats');
        themeStatsContainer.innerHTML = '';
        Object.entries(themesData)
            .sort((a, b) => b[1].collected / b[1].total - a[1].collected / a[1].total)
            .forEach(([theme, stats]) => {
                const cr = (stats.collected / stats.total) * 100;
                const tr = ((stats.collected + stats.wishlisted) / stats.total) * 100;
                const statButton = document.createElement('button');
                statButton.className = 'w-full text-left p-0 rounded-xl hover:bg-gray-200 transition-colors duration-200';
                statButton.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm text-gray-700 font-medium">${theme}</span>
                        <span class="text-xs font-medium text-gray-500"><span style="color: #22C55E;">${stats.collected}</span>/<span style="color: #FBBF24;">${stats.wishlisted}</span>/${stats.total}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar wishlist" style="width: ${tr}%;"></div>
                        <div class="progress-bar collected" style="width: ${cr}%;"></div>
                    </div>`;
                statButton.addEventListener('click', () => {
                    themeFilter.value = encodeURIComponent(theme);
                    renderUI();
                    toggleOverview();
                });
                const li = document.createElement('li');
                li.appendChild(statButton);
                themeStatsContainer.appendChild(li);
            });

        // 年份统计
        const yearsData = {};
        allCoinsData.forEach(coin => {
            if (!yearsData[coin.year]) yearsData[coin.year] = { total: 0, collected: 0, wishlisted: 0 };
            yearsData[coin.year].total++;
            if (myCollection.includes(coin.id)) yearsData[coin.year].collected++;
            if (myWishlist.includes(coin.id)) yearsData[coin.year].wishlisted++;
        });
        const yearStatsContainer = document.getElementById('yearStats');
        yearStatsContainer.innerHTML = '';
        Object.entries(yearsData)
            .sort((a, b) => parseInt(b[0]) - parseInt(a[0]))
            .forEach(([year, stats]) => {
                const cr = (stats.collected / stats.total) * 100;
                const tr = ((stats.collected + stats.wishlisted) / stats.total) * 100;
                const statButton = document.createElement('button');
                statButton.className = 'w-full text-left p-0 rounded-xl hover:bg-gray-200 transition-colors duration-200';
                statButton.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm text-gray-700 font-medium">${year}年</span>
                        <span class="text-xs font-medium text-gray-500"><span style="color: #22C55E;">${stats.collected}</span>/<span style="color: #FBBF24;">${stats.wishlisted}</span>/${stats.total}</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar wishlist" style="width: ${tr}%;"></div>
                        <div class="progress-bar collected" style="width: ${cr}%;"></div>
                    </div>`;
                statButton.addEventListener('click', () => {
                    yearFilter.value = year;
                    renderUI();
                    toggleOverview();
                });
                const li = document.createElement('li');
                li.appendChild(statButton);
                yearStatsContainer.appendChild(li);
            });
    }

    async function loadData(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`网络请求失败: ${response.status}`);
        return response.json();
    }

    function initFuse() {
        if (typeof Fuse !== 'undefined' && allCoinsData.length > 0) {
            // 注入拼音字段（pinyin-pro）
            if (typeof pinyinPro !== 'undefined') {
                const { pinyin } = pinyinPro;
                allCoinsData.forEach(coin => {
                    if (!coin.namePinyin) {
                        coin.namePinyin = pinyin(coin.name, { toneType: 'none', type: 'array' }).join('');
                    }
                    if (!coin.themePinyin) {
                        coin.themePinyin = pinyin(coin.theme, { toneType: 'none', type: 'array' }).join('');
                    }
                });
            }
            fuseIndex = new Fuse(allCoinsData, {
                keys: [
                    { name: 'name', weight: 2 },
                    { name: 'namePinyin', weight: 1.5 },
                    { name: 'theme', weight: 1.5 },
                    { name: 'themePinyin', weight: 1 },
                    { name: 'id', weight: 1 }
                ],
                threshold: 0.3,
                ignoreLocation: true,
                includeScore: true
            });
        }
    }

    function createMatrixGrid(data, mintIndex, allMintsData) {
        const grid = document.createElement('div');
        grid.className = 'matrix-grid';
        grid.style.transform = `rotate(${matrixDegree}deg)`;
        data.forEach((col, colIdx) => {
            if (col === '') {
                const gap = document.createElement('div');
                gap.className = 'matrix-gap-column';
                grid.appendChild(gap);
                return;
            }
            col.split('').forEach((bit, rowIdx) => {
                const cell = document.createElement('div');
                cell.className = 'matrix-cell' + (bit === '1' ? ' black' : '');
                if (bit === '1' && allMintsData) {
                    const isCommon = allMintsData.every(m => {
                        const targetCol = m.data[colIdx];
                        return targetCol && targetCol[rowIdx] === '1';
                    });
                    if (!isCommon) cell.classList.add('diff');
                }
                grid.appendChild(cell);
            });
        });
        return grid;
    }

    function buildMatrixCoin(name, code, mints) {
        const coin = document.createElement('div');
        coin.className = 'matrix-coin';
        coin.innerHTML = `<div class="matrix-coin-header"><h2>${name}</h2><div class="code">${code}</div></div>`;
        const mintsDiv = document.createElement('div');
        mintsDiv.className = 'matrix-mints';
        mints.forEach((m, idx) => {
            const mintDiv = document.createElement('div');
            mintDiv.className = 'matrix-mint';
            mintDiv.dataset.mint = m.name;
            mintDiv.innerHTML = `<div class="matrix-mint-name">${m.name}</div>`;
            mintDiv.appendChild(createMatrixGrid(m.data, idx, mints));
            mintsDiv.appendChild(mintDiv);
        });
        coin.appendChild(mintsDiv);
        return coin;
    }

    function renderMatrixCoins(coins) {
        matrixApp.innerHTML = '';
        coins.forEach(coin => {
            matrixApp.appendChild(buildMatrixCoin(coin.name, coin.code, coin.mints));
        });
    }

    // 加载矩阵数据
    fetch('matrix.json')
        .then(res => res.json())
        .then(data => { matrixData = data.coins; })
        .catch(() => console.log('矩阵数据加载失败'));

    /* ============================================================
       其他事件
       ============================================================ */
    document.getElementById('sendEmailBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        hideMenu();
        window.location.href = `mailto:theluojia@qq.com?subject=${encodeURIComponent('我的纪念币收藏网站-交流')}`;
    });

    document.getElementById('toggleImageView').addEventListener('click', () => {
        isBackView = !isBackView;
        renderUI();
    });

    sortOrderToggle.addEventListener('click', () => {
        currentSortOrder = currentSortOrder === 'desc' ? 'asc' : 'desc';
        sortOrderToggle.innerHTML = currentSortOrder === 'desc'
            ? `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 15 15" fill="none" aria-hidden="true"><path d="M11.5 0.5H12C12 0.223858 11.7761 0 11.5 0V0.5ZM4.5 0.5L4.85355 0.146447C4.65829 -0.0488155 4.34171 -0.0488155 4.14645 0.146447L4.5 0.5ZM10 1H11.5V0H10V1ZM11 0.5V6.5H12V0.5H11ZM10 7H13V6H10V7ZM11.578 8H11V9H11.578V8ZM12.9743 11.6581L13.3665 10.4815L12.4179 10.1653L12.0257 11.3419L12.9743 11.6581ZM11 12H12.5V11H11V12ZM11.9743 14.6581L12.9743 11.6581L12.0257 11.3419L11.0257 14.3419L11.9743 14.6581ZM9 10C9 11.1046 9.89543 12 11 12V11C10.4477 11 10 10.5523 10 10H9ZM11 8C9.89543 8 9 8.89543 9 10H10C10 9.44772 10.4477 9 11 9V8ZM11.578 9C12.1823 9 12.609 9.59201 12.4179 10.1653L13.3665 10.4815C13.7735 9.26071 12.8648 8 11.578 8V9ZM4.14645 0.146447L1.14645 3.14645L1.85355 3.85355L4.85355 0.853553L4.14645 0.146447ZM4.14645 0.853553L7.14645 3.85355L7.85355 3.14645L4.85355 0.146447L4.14645 0.853553ZM4 0.5V15H5V0.5H4Z" fill="currentColor"/></svg>`
            : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 15 15" fill="none" aria-hidden="true"><path d="M11.5 0.5H12C12 0.223858 11.7761 0 11.5 0V0.5ZM12.5 11.5L12.9743 11.6581L12.5 11.5ZM12.9819 10.0543L12.5076 9.89614L12.9819 10.0543ZM4.5 14.5L4.14645 14.8536C4.24021 14.9473 4.36739 15 4.5 15C4.63261 15 4.75978 14.9473 4.85355 14.8536L4.5 14.5ZM10 1H11.5V0H10V1ZM11 0.5V6.5H12V0.5H11ZM10 7H13V6H10V7ZM11.8617 8H11V9H11.8617V8ZM12.9743 11.6581L13.4563 10.2124L12.5076 9.89614L12.0257 11.3419L12.9743 11.6581ZM11 12H12.5V11H11V12ZM11.9743 14.6581L12.9743 11.6581L12.0257 11.3419L11.0257 14.3419L11.9743 14.6581ZM9 10C9 11.1046 9.89543 12 11 12V11C10.4477 11 10 10.5523 10 10H9ZM11 8C9.89543 8 9 8.89543 9 10H10C10 9.44772 10.4477 9 11 9V8ZM11.8617 9C12.3264 9 12.6545 9.45527 12.5076 9.89614L13.4563 10.2124C13.8191 9.12397 13.0089 8 11.8617 8V9ZM4.85355 14.8536L7.85355 11.8536L7.14645 11.1464L4.14645 14.1464L4.85355 14.8536ZM4.85355 14.1464L1.85355 11.1464L1.14645 11.8536L4.14645 14.8536L4.85355 14.1464ZM4 0V14.5H5V0H4Z" fill="currentColor"/></svg>`;
        renderUI();
    });

    function debounce(func, delay = 300) {
        let timeout;
        return function(...args) {
            const context = this;
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(context, args), delay);
        };
    }

    function populateFilters(coins) {
        const themes = [...new Set(coins.map(coin => coin.theme))].sort();
        const denominations = [...new Set(coins.map(coin => coin.denomination))].sort();
        const sizes = [...new Set(coins.map(coin => coin.size))].sort((a, b) => parseInt(a) - parseInt(b));
        const metals = [...new Set(coins.map(coin => coin.metal))].sort();
        const years = [...new Set(coins.map(coin => coin.year))].sort((a, b) => b - a);

        themeFilter.innerHTML = '<option value="">所有主题</option>' + themes.map(t => `<option value="${encodeURIComponent(t)}">${t}</option>`).join('');
        denominationFilter.innerHTML = '<option value="">所有面额</option>' + denominations.map(d => `<option value="${d}">${d}</option>`).join('');
        sizeFilter.innerHTML = '<option value="">所有大小</option>' + sizes.map(s => `<option value="${s}">${s}</option>`).join('');
        metalFilter.innerHTML = '<option value="">所有材质</option>' + metals.map(m => `<option value="${m}">${m}</option>`).join('');
        yearFilter.innerHTML = '<option value="">所有年份</option>' + years.map(y => `<option value="${y}">${y}年</option>`).join('');

        themeFilter.addEventListener('change', renderUI);
        denominationFilter.addEventListener('change', renderUI);
        sizeFilter.addEventListener('change', renderUI);
        metalFilter.addEventListener('change', renderUI);
        yearFilter.addEventListener('change', renderUI);
        statusFilter.addEventListener('change', renderUI);

        searchInput.addEventListener('input', debounce(renderUI));
    }

    /* ============================================================
       初始化
       ============================================================ */
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            allCoinsData = await loadData('coin_data.json');
            await loadCollection();
            populateFilters(allCoinsData);
            // 延迟初始化 Fuse.js（等待 pinyin-pro + fuse.js CDN 加载）
            setTimeout(initFuse, 1500);
            renderUI();
            updateCollectionOverview();

            document.getElementById('overviewHeader').addEventListener('click', toggleOverview);
            document.getElementById('overviewHeader').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleOverview(); }
            });
            document.getElementById('toggle-icon').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleOverview();
            });
            clearFiltersBtn.addEventListener('click', clearFilters);
        } catch (error) {
            console.error('无法初始化应用:', error);
            mainContainer.innerHTML = '<p class="text-center text-red-500 text-xl mt-10">数据加载失败，请刷新页面重试</p>';
        }
    });

    /* ============================================================
       PWA Service Worker 注册（#8）
       ============================================================ */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
    </script>
